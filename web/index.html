<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#E76F51"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Rena"/>
  <title>Rena</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link rel="stylesheet" href="css/app.css"/>
</head>
<body>

  <!-- ── Login ─────────────────────────────────────────────────────────── -->
  <div class="screen" id="screen-login">
    <div class="login-logo">✨</div>
    <div class="login-title">Rena</div>
    <div class="login-sub">Your personal health companion</div>
    <div id="google-btn"></div>
  </div>

  <!-- ── Onboarding ────────────────────────────────────────────────────── -->
  <div class="screen" id="screen-onboarding">
    <div class="onboard-wrap">
      <div class="onboard-title">Let's get started</div>
      <div class="onboard-sub">Tell Rena a bit about yourself so she can personalise your plan.</div>
      <form id="onboard-form">
        <div class="form-row">
          <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" placeholder="28" required min="13" max="100"/>
          </div>
          <div class="form-group">
            <label>Sex</label>
            <select name="sex" required>
              <option value="">Select…</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Height (cm)</label>
            <input type="number" name="height_cm" placeholder="170" required min="100" max="250"/>
          </div>
          <div class="form-group">
            <label>Weight (kg)</label>
            <input type="number" name="weight_kg" placeholder="70" required min="30" max="300" step="0.1"/>
          </div>
        </div>
        <div class="form-group">
          <label>Activity level</label>
          <select name="activity_level" required>
            <option value="">Select…</option>
            <option value="sedentary">Sedentary (desk job, little exercise)</option>
            <option value="lightly_active">Lightly active (1–3 days/week)</option>
            <option value="moderately_active">Moderately active (3–5 days/week)</option>
            <option value="very_active">Very active (6–7 days/week)</option>
          </select>
        </div>
        <button type="submit" class="btn-primary">Get started</button>
      </form>
    </div>
  </div>

  <!-- ── App ───────────────────────────────────────────────────────────── -->
  <div class="screen" id="screen-app">
    <div class="views">

      <!-- Home -->
      <div class="view" id="view-home">
        <div class="view-title">Good day 👋</div>
        <div id="home-content"></div>
      </div>

      <!-- History -->
      <div class="view" id="view-history">
        <div class="view-title">History</div>
        <div id="history-content"></div>
      </div>

      <!-- Plan -->
      <div class="view" id="view-plan">
        <div class="view-title">Today's plan</div>
        <div id="plan-content"></div>
      </div>

      <!-- Scan -->
      <div class="view" id="view-scan">
        <div class="view-title">Scan food</div>
        <div class="scan-actions">
          <label class="scan-btn">
            📷 Take a photo
            <input id="scan-camera" type="file" accept="image/*" capture="environment"/>
          </label>
          <label class="scan-btn">
            🖼 Choose from library
            <input id="scan-file" type="file" accept="image/*"/>
          </label>
        </div>
        <div id="scan-result"></div>
      </div>

    </div>

    <!-- Tab bar -->
    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="home">
        <span class="tab-icon">🏠</span>
        <span class="tab-label">Home</span>
      </button>
      <button class="tab-btn" data-tab="history">
        <span class="tab-icon">📊</span>
        <span class="tab-label">History</span>
      </button>
      <button class="tab-btn rena-btn" data-tab="rena">
        <div class="rena-circle">✨</div>
        <span class="tab-label">Rena</span>
      </button>
      <button class="tab-btn" data-tab="scan">
        <span class="tab-icon">📷</span>
        <span class="tab-label">Scan</span>
      </button>
      <button class="tab-btn" data-tab="plan">
        <span class="tab-icon">📅</span>
        <span class="tab-label">Plan</span>
      </button>
    </nav>
  </div>

  <!-- ── Voice overlay ──────────────────────────────────────────────────── -->
  <div id="voice-overlay">
    <div class="voice-card">
      <div class="voice-header">
        <span class="voice-title">Talk to Rena</span>
        <button class="voice-close" id="voice-close-btn">✕</button>
      </div>
      <div class="voice-wave" id="voice-wave">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
      <div class="voice-state-label" id="voice-state-label">Connecting…</div>
      <div class="voice-transcript" id="voice-transcript"></div>
      <button class="voice-action-btn" id="voice-action-btn">Tap to end</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/app.js"></script>
  <script>if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");</script>
</body>
</html>
