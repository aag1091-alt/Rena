# Cloud Build — deploys the Rena PWA to Firebase Hosting on every push to main.
# Set up: gcloud builds triggers create github --repo-name=Rena --branch-pattern=main --build-config=web/cloudbuild.yaml
steps:
  - name: "node:20"
    entrypoint: "npm"
    args: ["install", "-g", "firebase-tools"]
  - name: "node:20"
    entrypoint: "firebase"
    args: ["deploy", "--only", "hosting", "--project", "rena-490107", "--non-interactive"]
    dir: "web"

