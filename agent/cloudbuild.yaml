# Cloud Build config with Docker layer caching.
#
# Cache strategy:
#   - requirements.txt is copied + pip-installed BEFORE app code (see Dockerfile).
#   - --cache-from pulls the last pushed image so the pip layer is reused when
#     requirements.txt hasn't changed — cuts build time significantly.
#
# Cache busting:
#   - Change the FROM line in Dockerfile (e.g. python:3.13-slim → python:3.13-slim-bookworm)
#     to force a full rebuild from scratch.

steps:
  # Pull previous image for cache (ignore failure on first deploy)
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - docker pull us-central1-docker.pkg.dev/rena-490107/cloud-run-source-deploy/rena-agent:latest || true

  # Build with cache-from (context is agent/ subdirectory)
  - name: gcr.io/cloud-builders/docker
    dir: agent
    args:
      - build
      - --cache-from
      - us-central1-docker.pkg.dev/rena-490107/cloud-run-source-deploy/rena-agent:latest
      - --tag
      - us-central1-docker.pkg.dev/rena-490107/cloud-run-source-deploy/rena-agent:latest
      - .

  # Push
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/rena-490107/cloud-run-source-deploy/rena-agent:latest

  # Deploy to Cloud Run with env vars + secrets
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - rena-agent
      - --image
      - us-central1-docker.pkg.dev/rena-490107/cloud-run-source-deploy/rena-agent:latest
      - --region
      - us-central1
      - --allow-unauthenticated
      - --set-env-vars
      - GOOGLE_CLOUD_PROJECT=rena-490107,GOOGLE_CLOUD_LOCATION=us-central1,GCS_BUCKET=rena-visual-journey
      - --set-secrets
      - GOOGLE_API_KEY=GOOGLE_API_KEY:latest,GEMINI_API_KEY=GOOGLE_API_KEY:latest,SENTRY_DSN=SENTRY_DSN:latest

images:
  - us-central1-docker.pkg.dev/rena-490107/cloud-run-source-deploy/rena-agent:latest

options:
  logging: CLOUD_LOGGING_ONLY
